<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>只想對你說</title>
  <meta name="description" content="一頁夢幻告白頁。" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 64 64%27%3E%3Ctext y=%2752%27 font-size=%2752%27%3E%F0%9F%A6%9E%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=Noto+Serif+TC:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="confession.css" />
</head>
<body>
  <div class="sky"></div>
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>
  <div class="petals" aria-hidden="true"></div>

  <main class="wrap">
    <div class="card">
      <p class="small">for someone special</p>
      <h1 id="typing"></h1>
      <p class="line fade delay-1">我喜歡你。</p>
      <p class="line fade delay-2">不是一時心動，</p>
      <p class="line strong fade delay-3">是想很久以後，身邊也有你。</p>

      <div class="actions fade delay-4">
        <button id="musicBtn" class="btn">播放浪漫音樂</button>
        <a class="btn ghost" href="/">回首頁</a>
      </div>
    </div>
  </main>

  <script src="confession.js"></script>
</body>
</html>
