<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>阿蝦計算機</title>
  <meta name="description" content="阿蝦的簡易網頁計算機" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 64 64%27%3E%3Ctext y=%2752%27 font-size=%2752%27%3E%F0%9F%A6%9E%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="calculator.css" />
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <div class="topbar">
        <a href="/">← 回首頁</a>
        <span>阿蝦計算機</span>
      </div>
      <div class="screen">
        <div id="history" class="history"></div>
        <div id="display" class="display">0</div>
      </div>
      <div class="keys">
        <button class="key fn" data-action="clear">AC</button>
        <button class="key fn" data-action="delete">⌫</button>
        <button class="key fn" data-action="percent">%</button>
        <button class="key op" data-value="/">÷</button>

        <button class="key" data-value="7">7</button>
        <button class="key" data-value="8">8</button>
        <button class="key" data-value="9">9</button>
        <button class="key op" data-value="*">×</button>

        <button class="key" data-value="4">4</button>
        <button class="key" data-value="5">5</button>
        <button class="key" data-value="6">6</button>
        <button class="key op" data-value="-">−</button>

        <button class="key" data-value="1">1</button>
        <button class="key" data-value="2">2</button>
        <button class="key" data-value="3">3</button>
        <button class="key op" data-value="+">＋</button>

        <button class="key wide" data-action="toggle-sign">±</button>
        <button class="key" data-value="0">0</button>
        <button class="key" data-value=".">.</button>
        <button class="key eq" data-action="equals">＝</button>
      </div>
    </div>
  </div>
  <script src="calculator.js"></script>
</body>
</html>
