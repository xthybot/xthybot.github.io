<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>阿蝦文字清洗器</title>
  <meta name="description" content="整理換行、空白與標點的線上文字清洗工具。" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 64 64%27%3E%3Ctext y=%2752%27 font-size=%2752%27%3E%F0%9F%A6%9E%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="bg-grid"></div>
  <div class="orb orb-a"></div>
  <div class="orb orb-b"></div>

  <main class="shell">
    <header class="topbar">
      <a class="back" href="/">← 回首頁</a>
      <span class="badge">TEXT CLEANER</span>
    </header>

    <section class="hero panel">
      <p class="eyebrow">阿蝦工具頁</p>
      <h1>文字清洗器</h1>
      <p class="subtitle">把貼上來的亂格式文字，快速整理成比較乾淨、可直接再利用的版本。</p>
      <div class="chips">
        <span>移除多餘空白</span>
        <span>合併多重空行</span>
        <span>整理中英文標點</span>
        <span>一鍵複製</span>
      </div>
    </section>

    <section class="workspace">
      <div class="panel controls">
        <h2>整理選項</h2>
        <label><input type="checkbox" id="trimLines" checked> 修剪每行前後空白</label>
        <label><input type="checkbox" id="removeEmptyLines" checked> 合併多餘空行</label>
        <label><input type="checkbox" id="collapseSpaces" checked> 連續空白縮成一格</label>
        <label><input type="checkbox" id="normalizePunctuation" checked> 常見中文標點轉半形（，。！？：；）</label>
        <label><input type="checkbox" id="normalizeQuotes"> 智慧引號轉一般引號</label>
        <label><input type="checkbox" id="removeTrailingSpaces" checked> 移除行尾空白</label>

        <div class="actions">
          <button id="cleanBtn" class="btn primary">開始整理</button>
          <button id="copyBtn" class="btn">複製結果</button>
          <button id="swapBtn" class="btn">結果覆蓋原文</button>
          <button id="clearBtn" class="btn danger">清空</button>
        </div>

        <div class="stats" id="stats">尚未處理</div>
      </div>

      <div class="editors">
        <section class="panel editor-card">
          <div class="card-head">
            <h2>原始文字</h2>
            <button class="mini-btn" id="pasteDemoBtn">貼入範例</button>
          </div>
          <textarea id="inputText" placeholder="把逐字稿、貼文草稿、筆記、AI 輸出貼到這裡..."></textarea>
        </section>

        <section class="panel editor-card">
          <div class="card-head">
            <h2>整理結果</h2>
          </div>
          <textarea id="outputText" placeholder="整理後的結果會出現在這裡..." readonly></textarea>
        </section>
      </div>
    </section>
  </main>

  <script src="./script.js"></script>
</body>
</html>
