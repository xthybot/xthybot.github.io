<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>阿蝦 Mermaid 即時預覽器</title>
  <meta name="description" content="左側輸入 Mermaid 程式碼，右側即時預覽對應圖形的靜態網頁工具。" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 64 64%27%3E%3Ctext y=%2752%27 font-size=%2752%27%3E%F0%9F%A6%9E%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="bg-grid"></div>
  <div class="orb orb-a"></div>
  <div class="orb orb-b"></div>

  <main class="shell">
    <header class="topbar">
      <a class="back" href="/">← 回首頁</a>
      <span class="badge">MERMAID PREVIEW</span>
    </header>

    <section class="hero panel">
      <p class="eyebrow">阿蝦工具頁</p>
      <h1>Mermaid 即時預覽器</h1>
      <p class="subtitle">左側輸入 Mermaid 程式碼，右側立即渲染流程圖、時序圖、心智圖等圖形。純前端，適合直接放 GitHub Pages。</p>
      <div class="chips">
        <span>即時預覽</span>
        <span>錯誤提示</span>
        <span>PNG / SVG 匯出</span>
        <span>自訂主題顏色</span>
      </div>
    </section>

    <section class="workspace">
      <section class="panel editor-card">
        <div class="card-head">
          <h2>Mermaid 程式碼</h2>
          <div class="head-actions">
            <button class="mini-btn" id="demoBtn">貼入範例</button>
            <button class="mini-btn" id="copyBtn">複製程式碼</button>
          </div>
        </div>
        <textarea id="codeInput" spellcheck="false" placeholder="在這裡輸入 Mermaid，例如：
flowchart TD
  A[開始] --> B{有資料嗎？}
  B -->|有| C[渲染圖形]
  B -->|沒有| D[顯示提示]"></textarea>
        <div class="status-row">
          <span id="statusText">等待輸入</span>
          <span id="charCount">0 字元</span>
        </div>
      </section>

      <section class="panel preview-card">
        <div class="card-head">
          <h2>即時預覽</h2>
          <div class="head-actions">
            <button class="mini-btn" id="downloadSvgBtn">下載 SVG</button>
            <button class="mini-btn" id="downloadPngBtn">下載 PNG</button>
          </div>
        </div>

        <section class="theme-panel">
          <div class="theme-head">
            <h3>主題設定</h3>
            <label class="theme-mode-label">模式
              <select id="themeMode">
                <option value="dark">深色</option>
                <option value="default">淺色</option>
              </select>
            </label>
          </div>

          <div class="theme-grid">
            <label>主色
              <input type="color" id="primaryColor" value="#7c8cff" />
            </label>
            <label>線條色
              <input type="color" id="lineColor" value="#73e0ff" />
            </label>
            <label>文字色
              <input type="color" id="textColor" value="#e8f0ff" />
            </label>
            <label>背景色
              <input type="color" id="backgroundColor" value="#0b1220" />
            </label>
          </div>

          <div class="theme-actions">
            <button class="mini-btn" id="applyThemeBtn">套用主題</button>
            <button class="mini-btn" id="resetThemeBtn">重設主題</button>
          </div>
        </section>

        <div id="errorBox" class="error-box" hidden></div>
        <div id="preview" class="preview-area">
          <div class="empty-state">圖會顯示在這裡</div>
        </div>
      </section>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/canvg@4.0.2/lib/umd.min.js"></script>
  <script type="module" src="./script.js"></script>
</body>
</html>
